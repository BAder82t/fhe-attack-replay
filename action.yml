name: "FHE Attack Replay"
description: "Replay published FHE attacks against a (library, params) target and surface a status badge."
author: "Vaultbytes"
branding:
  icon: "shield"
  color: "purple"

inputs:
  library:
    description: "Target FHE library: toy-lwe | openfhe | seal | lattigo | tfhe-rs."
    required: true
  params:
    description: "Path to params JSON file."
    required: true
  attacks:
    description: "Comma-separated attack ids, or 'all'."
    required: false
    default: "all"
  scheme:
    description: "Override scheme (default: read from params['scheme'])."
    required: false
    default: ""
  output-json:
    description: "Path to write the JSON report."
    required: false
    default: "fhe-replay-report.json"
  badge:
    description: "Path to write the SVG status badge."
    required: false
    default: "fhe-replay-badge.svg"
  min-coverage:
    description: "Minimum implemented coverage ratio (0.0-1.0). Empty disables the gate."
    required: false
    default: ""
  allow-not-implemented:
    description: "Treat NOT_IMPLEMENTED results as success. Off by default — green CI requires real results."
    required: false
    default: "false"
  allow-skipped:
    description: "Treat all-SKIPPED runs as success. Off by default."
    required: false
    default: "false"

outputs:
  report:
    description: "Path to the JSON report."
    value: ${{ steps.run.outputs.report }}
  badge:
    description: "Path to the SVG badge."
    value: ${{ steps.run.outputs.badge }}
  status:
    description: "Overall status: safe | vulnerable | error | not_implemented | skipped."
    value: ${{ steps.run.outputs.status }}
  coverage-ratio:
    description: "Implemented-attacks ratio (0.0 - 1.0)."
    value: ${{ steps.run.outputs.coverage_ratio }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install fhe-attack-replay
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install fhe-attack-replay

    - name: Replay attacks
      id: run
      shell: bash
      run: |
        set -e
        scheme_arg=""
        if [ -n "${{ inputs.scheme }}" ]; then
          scheme_arg="--scheme ${{ inputs.scheme }}"
        fi
        coverage_arg=""
        if [ -n "${{ inputs.min-coverage }}" ]; then
          coverage_arg="--min-coverage ${{ inputs.min-coverage }}"
        fi
        allow_ni=""
        if [ "${{ inputs.allow-not-implemented }}" = "true" ]; then
          allow_ni="--allow-not-implemented"
        fi
        allow_skip=""
        if [ "${{ inputs.allow-skipped }}" = "true" ]; then
          allow_skip="--allow-skipped"
        fi
        set +e
        fhe-replay run \
          --lib "${{ inputs.library }}" \
          --params "${{ inputs.params }}" \
          --attacks "${{ inputs.attacks }}" \
          --output-json "${{ inputs.output-json }}" \
          --badge "${{ inputs.badge }}" \
          --quiet \
          $scheme_arg $coverage_arg $allow_ni $allow_skip
        rc=$?
        set -e
        status=$(python -c "import json; print(json.load(open('${{ inputs.output-json }}'))['overall_status'])")
        ratio=$(python -c "import json; print(json.load(open('${{ inputs.output-json }}'))['coverage']['ratio'])")
        echo "report=${{ inputs.output-json }}" >> "$GITHUB_OUTPUT"
        echo "badge=${{ inputs.badge }}" >> "$GITHUB_OUTPUT"
        echo "status=$status" >> "$GITHUB_OUTPUT"
        echo "coverage_ratio=$ratio" >> "$GITHUB_OUTPUT"
        case "$rc" in
          0) ;;
          2) echo "::error::fhe-attack-replay reported VULNERABLE." >&2 ;;
          3) echo "::error::fhe-attack-replay encountered an internal error." >&2 ;;
          4) echo "::error::fhe-attack-replay: one or more selected attacks are NOT_IMPLEMENTED or below min-coverage." >&2 ;;
          5) echo "::error::fhe-attack-replay: every selected attack was SKIPPED. Set allow-skipped: true to ignore." >&2 ;;
          *) echo "::error::fhe-attack-replay: unexpected exit $rc" >&2 ;;
        esac
        exit $rc
