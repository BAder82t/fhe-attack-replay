name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -ra --cov=fhe_attack_replay --cov-report=term-missing
      - name: Smoke test CLI
        run: |
          fhe-replay --version
          fhe-replay list all
          fhe-replay run --lib openfhe --params examples/bfv-128.json \
            --output-json /tmp/report.json --badge /tmp/badge.svg --quiet || true
          test -s /tmp/report.json
          test -s /tmp/badge.svg
