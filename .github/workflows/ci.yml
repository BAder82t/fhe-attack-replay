name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Ruff
        run: python -m ruff check .
      - name: Pytest
        run: python -m pytest -ra --cov=fhe_attack_replay
      - name: CLI smoke
        run: |
          fhe-replay list all
          fhe-replay doctor
          set +e
          fhe-replay run --lib toy-lwe --params examples/toy-lwe-vulnerable.json --attacks cheon-2024-127 --output-json report.json --badge badge.svg --quiet
          rc=$?
          set -e
          test "$rc" -eq 2
          test -s report.json
          test -s badge.svg
      - name: Package
        if: matrix.python == '3.12'
        run: |
          python -m build
          python -m twine check dist/*

