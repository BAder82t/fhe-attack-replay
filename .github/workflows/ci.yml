name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -ra --cov=fhe_attack_replay --cov-report=term-missing
      - name: Build package
        run: python -m build
      - name: Check package metadata
        run: python -m twine check dist/*
      - name: Smoke test CLI (toy-lwe live attack)
        run: |
          fhe-replay --version
          fhe-replay list all
          fhe-replay doctor
          # toy-lwe live-oracle replay: unmitigated config must report VULNERABLE (exit 2).
          set +e
          fhe-replay run --lib toy-lwe --params examples/toy-lwe-vulnerable.json \
            --attacks cheon-2024-127 --output-json /tmp/v.json --quiet
          rc_v=$?
          set -e
          test "$rc_v" = "2"
          python -c "import json; d=json.load(open('/tmp/v.json')); assert d['overall_status']=='vulnerable'"
          # toy-lwe live-oracle replay: noise-flooded config must report SAFE (exit 0).
          fhe-replay run --lib toy-lwe --params examples/toy-lwe-mitigated.json \
            --attacks cheon-2024-127 --output-json /tmp/m.json --quiet
          python -c "import json; d=json.load(open('/tmp/m.json')); assert d['overall_status']=='safe'"
          # SEAL adapter still scaffold: full run must report scaffolded coverage.
          fhe-replay run --lib seal --params examples/bfv-128.json \
            --output-json /tmp/report.json --badge /tmp/badge.svg \
            --allow-not-implemented --allow-skipped --quiet
          test -s /tmp/report.json
          test -s /tmp/badge.svg
          python -c "import json; d=json.load(open('/tmp/report.json')); assert 'coverage' in d and d['coverage']['requested'] == 5"
