name: release-binaries

# Builds the cross-platform helper binaries that the lattigo and tfhe-rs
# Python adapters spawn. Triggered on tag push (`v*`) and on manual
# workflow dispatch. Artifacts are attached to the matching GitHub
# Release. Users without a Go / Rust toolchain can download the
# pre-built binary that matches their host triple, drop it on PATH, and
# run `fhe-replay` against the live-oracle adapters immediately.
#
# Build matrix:
#   - lattigo helper (Go) → linux-amd64, linux-arm64, darwin-amd64,
#     darwin-arm64, windows-amd64
#   - tfhe-rs helper (Rust) → linux-amd64, linux-arm64, darwin-amd64,
#     darwin-arm64, windows-amd64
#
# Naming: `fhe-replay-<lib>-helper-<os>-<arch>[.exe]`. The Python
# adapter discovers the binary via `shutil.which("fhe-replay-<lib>-helper")`
# so users rename / symlink to the unsuffixed name on install.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  lattigo:
    name: lattigo-helper (${{ matrix.os }}-${{ matrix.goarch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            goarch: amd64
            runner: ubuntu-latest
          - os: linux
            goarch: arm64
            runner: ubuntu-latest
          - os: darwin
            goarch: amd64
            runner: macos-latest
          - os: darwin
            goarch: arm64
            runner: macos-latest
          - os: windows
            goarch: amd64
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: vendor/lattigo-helper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: vendor/lattigo-helper/go.sum
      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        shell: bash
        run: |
          ext=""
          if [ "${{ matrix.os }}" = "windows" ]; then ext=".exe"; fi
          out="fhe-replay-lattigo-helper-${{ matrix.os }}-${{ matrix.goarch }}${ext}"
          go build -trimpath -ldflags="-s -w" -o "$out" .
          echo "ARTIFACT=$out" >> "$GITHUB_ENV"
      - name: Test (host triple only)
        if: matrix.os == runner.os || (matrix.os == 'darwin' && runner.os == 'macOS') || (matrix.os == 'linux' && runner.os == 'Linux') || (matrix.os == 'windows' && runner.os == 'Windows')
        env:
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          if [ "${{ matrix.goarch }}" = "$(go env GOHOSTARCH)" ]; then
            go test ./...
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: vendor/lattigo-helper/${{ env.ARTIFACT }}
          if-no-files-found: error

  tfhe-rs:
    name: tfhe-rs-helper (${{ matrix.os }}-${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
          - os: darwin
            arch: amd64
            target: x86_64-apple-darwin
            runner: macos-latest
          - os: darwin
            arch: arm64
            target: aarch64-apple-darwin
            runner: macos-latest
          - os: windows
            arch: amd64
            target: x86_64-pc-windows-msvc
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: vendor/tfhe-rs-helper
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compile linker (linux-arm64)
        if: matrix.os == 'linux' && matrix.arch == 'arm64'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            vendor/tfhe-rs-helper/target
          key: cargo-${{ matrix.target }}-${{ hashFiles('vendor/tfhe-rs-helper/Cargo.lock') }}
      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage artifact
        shell: bash
        run: |
          ext=""
          if [ "${{ matrix.os }}" = "windows" ]; then ext=".exe"; fi
          src="target/${{ matrix.target }}/release/fhe-replay-tfhe-rs-helper${ext}"
          out="fhe-replay-tfhe-rs-helper-${{ matrix.os }}-${{ matrix.arch }}${ext}"
          cp "$src" "$out"
          echo "ARTIFACT=$out" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: vendor/tfhe-rs-helper/${{ env.ARTIFACT }}
          if-no-files-found: error

  release:
    needs: [lattigo, tfhe-rs]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Compute checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
